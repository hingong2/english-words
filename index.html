<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Words</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');

        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: #f0f9ff;
            user-select: none;
            overflow-x: hidden;
        }

        .word-card {
            transition: all 0.3s ease;
        }

        .tab-active {
            background-color: #3b82f6 !important;
            color: white !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .quiz-option,
        .match-card,
        .letter-card {
            transition: all 0.2s;
            cursor: pointer;
        }

        .quiz-option:active,
        .match-card:active,
        .letter-card:active {
            transform: scale(0.95);
        }

        .match-selected {
            border-color: #3b82f6;
            background-color: #eff6ff;
            transform: scale(1.05);
        }

        /* 정답 시 색상 클래스들 */
        .match-correct {
            pointer-events: none;
            transform: scale(1);
            opacity: 1;
        }

        .matched-color-0 {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }

        .matched-color-1 {
            background-color: #fef9c3 !important;
            border-color: #eab308 !important;
            color: #854d0e !important;
        }

        .matched-color-2 {
            background-color: #fce7f3 !important;
            border-color: #ec4899 !important;
            color: #9d174d !important;
        }

        .matched-color-3 {
            background-color: #f3e8ff !important;
            border-color: #a855f7 !important;
            color: #6b21a8 !important;
        }

        .matched-color-4 {
            background-color: #ffedd5 !important;
            border-color: #f97316 !important;
            color: #9a3412 !important;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .correct-anim {
            animation: bounce 0.5s ease infinite;
        }

        /* 스펠링 게임 전용 스타일 */
        .letter-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>

<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">

    <!-- 1. Name Entry Screen -->
    <div id="nameEntryScreen"
        class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center border-4 border-blue-100">
        <div class="mb-6">
            <div class="w-32 h-32 mx-auto mb-4 drop-shadow-lg">
                <img src="mascot.png" alt="Cute Mascot"
                    class="w-full h-full object-contain rounded-full border-4 border-white shadow-inner bg-blue-50">
            </div>
            <h1 class="text-2xl font-black text-gray-800 mb-2">반가워요!</h1>
            <p class="text-gray-500 text-sm font-medium">영어 이름을 입력하고 신나게 시작해볼까요?</p>
        </div>
        <input type="text" id="nameInput" placeholder="Enter your English name"
            class="w-full p-4 border-2 border-blue-100 rounded-2xl mb-4 text-center text-xl font-bold focus:outline-none focus:border-blue-400">
        <button onclick="startApp()"
            class="w-full bg-blue-500 hover:bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg transition-transform active:scale-95 text-lg">
            단어장으로 고고!
        </button>
    </div>

    <!-- 2. Main App Container -->
    <div id="mainApp"
        class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-blue-100 hidden">

        <!-- Header -->
        <div id="header"
            class="bg-blue-500 p-6 text-center text-white transition-colors duration-500 relative flex justify-center items-center">
            <!-- Home Button: 이제 학습 메인 화면으로 이동합니다 -->
            <button onclick="resetToHome()" class="absolute left-6 text-white hover:text-blue-100 transition-colors"
                title="단어장 메인으로">
                <i class="fas fa-home text-xl"></i>
            </button>

            <h1 id="headerTitle" class="text-2xl font-extrabold mx-8">
                <i class="fas fa-graduation-cap text-yellow-300 mr-2"></i><span id="displayUserName"></span>의 영어 단어장
            </h1>

            <!-- Admin Button -->
            <button onclick="openAdmin()" class="absolute right-6 text-white hover:text-blue-100 transition-colors"
                title="Admin Menu">
                <i class="fas fa-cog text-xl"></i>
            </button>
        </div>

        <!-- Day Tabs -->
        <div id="dayTabs" class="flex p-4 gap-2 bg-blue-50">
            <button onclick="switchDay('Mon')" id="tabMon"
                class="flex-1 py-3 rounded-2xl font-bold text-blue-600 bg-white border-2 border-blue-200 transition-all tab-active">Mon</button>
            <button onclick="switchDay('Wed')" id="tabWed"
                class="flex-1 py-3 rounded-2xl font-bold text-blue-600 bg-white border-2 border-blue-200 transition-all">Wed</button>
            <button onclick="switchDay('Fri')" id="tabFri"
                class="flex-1 py-3 rounded-2xl font-bold text-blue-600 bg-white border-2 border-blue-200 transition-all">Fri</button>
        </div>

        <!-- Main Content Area -->
        <div id="mainContent" class="p-6 min-h-[500px] flex flex-col">

            <!-- Study View -->
            <div id="studyView" class="space-y-6">
                <div id="wordList" class="space-y-6"></div>
                <div class="grid grid-cols-1 gap-3 mt-6">
                    <p class="text-center text-sm font-bold text-gray-400">다 외웠나요? 그럼 게임을 시작해요!</p>
                    <button onclick="openQuizMenu()"
                        class="w-full bg-yellow-400 hover:bg-yellow-500 text-white font-black py-4 rounded-2xl shadow-lg flex items-center justify-center gap-2 text-lg transition-transform active:scale-95">
                        <i class="fas fa-rocket"></i> 게임 모드로 변신!
                    </button>
                </div>
            </div>

            <!-- Quiz Selection Menu -->
            <div id="quizMenu" class="hidden space-y-4 py-4">
                <h3 class="text-center font-bold text-gray-700 mb-4">어떤 모험을 떠날까요?</h3>
                <button onclick="startQuiz('choice')"
                    class="w-full p-5 bg-blue-50 border-2 border-blue-200 rounded-2xl flex items-center gap-4 hover:bg-blue-100 transition-all shadow-sm">
                    <div class="bg-blue-500 text-white w-12 h-12 rounded-full flex items-center justify-center text-xl">
                        <i class="fas fa-star"></i>
                    </div>
                    <div class="text-left">
                        <p class="font-bold text-gray-800 text-lg">뜻 고르기</p>
                        <p class="text-xs text-gray-500">알맞은 뜻을 콕! 찍어주세요</p>
                    </div>
                </button>
                <button onclick="startQuiz('match')"
                    class="w-full p-5 bg-green-50 border-2 border-green-200 rounded-2xl flex items-center gap-4 hover:bg-green-100 transition-all shadow-sm">
                    <div
                        class="bg-green-500 text-white w-12 h-12 rounded-full flex items-center justify-center text-xl">
                        <i class="fas fa-puzzle-piece"></i>
                    </div>
                    <div class="text-left">
                        <p class="font-bold text-gray-800 text-lg">카드 짝 맞추기</p>
                        <p class="text-xs text-gray-500">단어와 뜻을 연결해요</p>
                    </div>
                </button>
                <button onclick="startQuiz('scramble')"
                    class="w-full p-5 bg-purple-50 border-2 border-purple-200 rounded-2xl flex items-center gap-4 hover:bg-purple-100 transition-all shadow-sm">
                    <div
                        class="bg-purple-500 text-white w-12 h-12 rounded-full flex items-center justify-center text-xl">
                        <i class="fas fa-keyboard"></i>
                    </div>
                    <div class="text-left">
                        <p class="font-bold text-gray-800 text-lg">스펠링 게임</p>
                        <p class="text-xs text-gray-500">철자를 순서대로 톡톡!</p>
                    </div>
                </button>
                <button onclick="exitQuiz()" class="w-full py-3 text-gray-400 font-bold mt-4">단어장으로 돌아가기</button>
            </div>

            <!-- Choice Quiz View -->
            <div id="quizViewChoice" class="hidden text-center">
                <div id="choiceInfo" class="flex justify-between items-center mb-6"></div>
                <div class="mb-8">
                    <h2 id="choiceWord" class="text-5xl font-black text-gray-800 mb-4 lowercase"></h2>
                    <button id="choiceSpeakBtn" class="bg-blue-100 text-blue-600 p-4 rounded-full shadow-inner"><i
                            class="fas fa-volume-up text-2xl"></i></button>
                </div>
                <div id="choiceOptions" class="grid grid-cols-1 gap-3"></div>
            </div>

            <!-- Match Quiz View -->
            <div id="quizViewMatch" class="hidden">
                <p class="text-center text-gray-500 mb-4 text-sm font-bold">같은 짝을 찾으면 같은 색으로 변해요!</p>
                <div id="matchGrid" class="grid grid-cols-2 gap-3"></div>
            </div>

            <!-- Scramble Quiz View -->
            <div id="quizViewScramble" class="hidden text-center">
                <p id="scrambleMeaning" class="text-2xl font-bold text-blue-600 mb-2"></p>
                <div class="mb-6 flex justify-center items-center gap-4">
                    <div id="scrambleDisplay"
                        class="text-3xl font-black tracking-widest text-gray-300 border-b-4 border-dashed min-h-[50px] min-w-[150px] flex items-center justify-center lowercase">
                    </div>
                    <button id="scrambleSpeakBtn" class="text-blue-400 hover:text-blue-600"><i
                            class="fas fa-volume-up text-xl"></i></button>
                </div>
                <div id="scrambleLetters" class="letter-grid"></div>
                <button onclick="resetScramble()" class="mt-8 text-xs text-gray-400 border px-3 py-1 rounded-lg">처음부터
                    다시</button>
            </div>

            <!-- Result View -->
            <div id="resultView" class="hidden text-center py-10">
                <div class="text-7xl mb-6 correct-anim">⭐</div>
                <h2 class="text-3xl font-black text-gray-800 mb-2">대단해요! 최고예요!</h2>
                <p class="text-gray-600 mb-6 font-medium">오늘 공부도 완벽하게 성공!</p>
                <button onclick="exitQuiz()"
                    class="w-full bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg text-lg">기분 좋게
                    돌아가기</button>
            </div>

        </div>
    </div>

    <!-- 3. Admin Login Screen -->
    <div id="adminLoginScreen"
        class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center border-4 border-gray-200 hidden">
        <h2 class="text-2xl font-black text-gray-800 mb-6"><i class="fas fa-lock text-gray-400 mr-2"></i>관리자 로그인</h2>
        <input type="password" id="adminPassword" placeholder="비밀번호를 입력하세요"
            class="w-full p-4 border-2 border-gray-200 rounded-2xl mb-4 text-center text-xl font-bold focus:outline-none focus:border-gray-400">
        <button onclick="loginAdmin()"
            class="w-full bg-gray-800 hover:bg-gray-900 text-white font-black py-4 rounded-2xl shadow-lg transition-transform active:scale-95 text-lg mb-2">로그인</button>
        <button onclick="closeAdmin()"
            class="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 rounded-2xl transition-transform active:scale-95">취소</button>
        <p id="adminLoginError" class="text-red-500 text-sm mt-4 hidden font-bold">비밀번호가 틀렸습니다.</p>
    </div>

    <!-- 4. Admin Dashboard -->
    <div id="adminDashboard"
        class="max-w-md w-full bg-white rounded-3xl shadow-xl border-4 border-gray-800 hidden flex flex-col h-[90vh]">
        <div class="bg-gray-800 p-4 text-white flex justify-between items-center shrink-0 rounded-t-2xl">
            <h2 class="text-xl font-bold"><i class="fas fa-cogs mr-2"></i>단어 관리</h2>
            <button onclick="closeAdmin()" class="text-gray-300 hover:text-white"><i
                    class="fas fa-times text-2xl"></i></button>
        </div>

        <div class="p-4 flex gap-2 bg-gray-100 shrink-0">
            <button onclick="switchAdminDay('Mon')" id="adminTabMon"
                class="flex-1 py-2 rounded-xl font-bold bg-white text-gray-600 border border-gray-300 tab-active">Mon</button>
            <button onclick="switchAdminDay('Wed')" id="adminTabWed"
                class="flex-1 py-2 rounded-xl font-bold bg-white text-gray-600 border border-gray-300">Wed</button>
            <button onclick="switchAdminDay('Fri')" id="adminTabFri"
                class="flex-1 py-2 rounded-xl font-bold bg-white text-gray-600 border border-gray-300">Fri</button>
        </div>

        <div class="p-4 bg-gray-50 border-b shrink-0">
            <h3 class="font-bold text-gray-700 mb-2">새 단어 추가</h3>
            <div class="space-y-2">
                <input type="text" id="newWord" placeholder="단어 (예: apple)" class="w-full p-2 border rounded-lg">
                <input type="text" id="newMeaning" placeholder="뜻 (예: 사과)" class="w-full p-2 border rounded-lg">
                <input type="text" id="newExample" placeholder="영어 예문" class="w-full p-2 border rounded-lg">
                <input type="text" id="newKorEx" placeholder="한글 뜻 예문" class="w-full p-2 border rounded-lg">
                <button onclick="addWord()"
                    class="w-full bg-blue-500 text-white font-bold py-2 rounded-lg mt-2">추가하기</button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 bg-white" id="adminWordList">
            <!-- Admin word list will be rendered here -->
        </div>
    </div>

    <!-- Feedback Overlay -->
    <div id="feedback"
        class="fixed inset-0 pointer-events-none flex items-center justify-center z-[100] opacity-0 transition-opacity duration-300">
        <div id="feedbackIcon" class="text-9xl"></div>
    </div>

    <script>
        const wordData = {
            Mon: [
                { word: "eraser", meaning: "지우개", example: "I have an eraser.", korEx: "나는 지우개가 있어요." },
                { word: "ruler", meaning: "자", example: "This is a long ruler.", korEx: "이것은 긴 자예요." }
            ],
            Wed: [
                { word: "pencil-case", meaning: "필통", example: "Put your pen in the pencil-case.", korEx: "필통에 펜을 넣으세요." },
                { word: "notebook", meaning: "공책", example: "Write your name on the notebook.", korEx: "공책에 이름을 쓰세요." }
            ],
            Fri: [
                { word: "desk", meaning: "책상", example: "The book is on the desk.", korEx: "책이 책상 위에 있어요." },
                { word: "chair", meaning: "의자", example: "Sit on the chair.", korEx: "의자에 앉으세요." }
            ]
        };

        let userName = "나";
        let currentDay = 'Mon';
        let adminCurrentDay = 'Mon';
        let usVoice = null;
        let quizType = '';
        let quizState = { index: 0, score: 0, items: [], selected: null, currentInput: "" };

        function initVoices() {
            const voices = window.speechSynthesis.getVoices();
            usVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Natural')) ||
                voices.find(v => v.lang === 'en-US' && v.name.includes('Google')) ||
                voices.find(v => v.lang === 'en-US') ||
                voices[0];
        }
        window.speechSynthesis.onvoiceschanged = initVoices;

        function speak(text, isExciting = false) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            if (usVoice) utterance.voice = usVoice;
            utterance.lang = 'en-US';

            if (isExciting) {
                utterance.pitch = 1.4;
                utterance.rate = 1.05;
            } else {
                utterance.pitch = 1.15;
                utterance.rate = 0.8;
            }
            window.speechSynthesis.speak(utterance);
        }

        function startApp() {
            const input = document.getElementById('nameInput');
            if (input.value.trim() !== "") {
                userName = input.value.trim();
            }

            document.getElementById('displayUserName').innerText = userName;
            document.getElementById('nameEntryScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');

            speak("Welcome, " + userName + "! Let's study English!", true);
            switchDay('Mon');
        }

        // --- 수정된 기능: 홈 버튼 클릭 시 단어 리스트 메인으로 이동 ---
        function resetToHome() {
            // 퀴즈나 결과 화면 등 다른 화면에 있을 때만 확인 후 메인 리스트로 이동
            const isAtStudyView = !document.getElementById('studyView').classList.contains('hidden');

            if (isAtStudyView) {
                // 이미 메인 화면이라면 아무것도 하지 않음
                return;
            }

            window.speechSynthesis.cancel();

            // 모든 퀴즈 및 게임 관련 화면 숨기기
            document.getElementById('quizMenu').classList.add('hidden');
            document.getElementById('quizViewChoice').classList.add('hidden');
            document.getElementById('quizViewMatch').classList.add('hidden');
            document.getElementById('quizViewScramble').classList.add('hidden');
            document.getElementById('resultView').classList.add('hidden');

            // 메인 단어장 학습 화면 및 탭 보이기
            document.getElementById('studyView').classList.remove('hidden');
            document.getElementById('dayTabs').classList.remove('hidden');

            // 헤더 스타일 초기화
            document.getElementById('header').style.backgroundColor = '#3b82f6';
            document.getElementById('headerTitle').innerHTML = `<i class="fas fa-graduation-cap text-yellow-300 mr-2"></i>${userName}의 영어 단어장`;

            switchDay(currentDay);
        }

        // --- Admin Functions ---
        function openAdmin() {
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('adminLoginScreen').classList.remove('hidden');
            document.getElementById('adminPassword').value = '';
            document.getElementById('adminLoginError').classList.add('hidden');
        }

        function closeAdmin() {
            document.getElementById('adminLoginScreen').classList.add('hidden');
            document.getElementById('adminDashboard').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            switchDay(currentDay);
        }

        function loginAdmin() {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === "2222") {
                document.getElementById('adminLoginScreen').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
                switchAdminDay('Mon');
            } else {
                document.getElementById('adminLoginError').classList.remove('hidden');
            }
        }

        function switchAdminDay(day) {
            adminCurrentDay = day;
            document.querySelectorAll('[id^="adminTab"]').forEach(b => {
                if (b.id === 'adminTab' + day) {
                    b.classList.add('bg-gray-800', 'text-white', 'border-gray-800');
                    b.classList.remove('bg-white', 'text-gray-600', 'border-gray-300');
                } else {
                    b.classList.remove('bg-gray-800', 'text-white', 'border-gray-800');
                    b.classList.add('bg-white', 'text-gray-600', 'border-gray-300');
                }
            });
            renderAdminList();
        }

        function renderAdminList() {
            const list = document.getElementById('adminWordList');
            list.innerHTML = '';
            wordData[adminCurrentDay].forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center p-3 border-b mb-2 bg-gray-50 rounded-lg';
                div.innerHTML = `
                    <div>
                        <p class="font-bold">${item.word} <span class="text-sm font-normal text-gray-500">(${item.meaning})</span></p>
                        <p class="text-xs text-gray-400 truncate max-w-[200px]">${item.example}</p>
                    </div>
                    <button onclick="deleteWord(${index})" class="text-red-500 p-2 hover:bg-red-50 rounded"><i class="fas fa-trash"></i></button>
                `;
                list.appendChild(div);
            });
        }

        function addWord() {
            const word = document.getElementById('newWord').value.trim();
            const meaning = document.getElementById('newMeaning').value.trim();
            const example = document.getElementById('newExample').value.trim() || 'No example';
            const korEx = document.getElementById('newKorEx').value.trim() || '예문 없음';

            if (!word || !meaning) {
                alert("단어와 뜻은 필수입니다.");
                return;
            }

            wordData[adminCurrentDay].push({ word, meaning, example, korEx });

            document.getElementById('newWord').value = '';
            document.getElementById('newMeaning').value = '';
            document.getElementById('newExample').value = '';
            document.getElementById('newKorEx').value = '';

            renderAdminList();
        }

        function deleteWord(index) {
            if (confirm("정말 삭제하시겠습니까?")) {
                wordData[adminCurrentDay].splice(index, 1);
                renderAdminList();
            }
        }

        function switchDay(day) {
            currentDay = day;
            document.querySelectorAll('#dayTabs button').forEach(b => b.classList.toggle('tab-active', b.id === 'tab' + day));
            const list = document.getElementById('wordList');
            list.innerHTML = '';
            wordData[day].forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'word-card bg-white border-2 border-gray-100 rounded-2xl p-5 shadow-sm space-y-4';
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h2 class="text-3xl font-black text-gray-800 lowercase">${item.word}</h2>
                            <p class="text-blue-600 font-bold">${item.meaning}</p>
                        </div>
                        <button onclick="speak('${item.word}')" class="bg-blue-100 text-blue-600 p-3 rounded-full hover:bg-blue-200 transition-colors shadow-sm">
                            <i class="fas fa-volume-up"></i>
                        </button>
                    </div>
                    
                    <div class="bg-blue-50 p-4 rounded-xl border-l-4 border-blue-400">
                        <div class="flex justify-between items-center mb-1">
                            <p class="text-gray-700 font-bold italic">"${item.example}"</p>
                            <button onclick="speak('${item.example.replace(/'/g, "\\'")}')" class="text-blue-400 hover:text-blue-600 ml-2">
                                <i class="fas fa-play-circle text-lg"></i>
                            </button>
                        </div>
                        <p class="text-gray-500 text-sm font-medium">${item.korEx}</p>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function openQuizMenu() {
            document.getElementById('studyView').classList.add('hidden');
            document.getElementById('quizMenu').classList.remove('hidden');
            document.getElementById('dayTabs').classList.add('hidden');
        }

        function exitQuiz() {
            document.getElementById('studyView').classList.remove('hidden');
            document.querySelectorAll('[id^="quizView"], #quizMenu, #resultView').forEach(el => el.classList.add('hidden'));
            document.getElementById('dayTabs').classList.remove('hidden');
            document.getElementById('header').style.backgroundColor = '#3b82f6';
            document.getElementById('headerTitle').innerHTML = `<i class="fas fa-graduation-cap text-yellow-300 mr-2"></i>${userName}의 영어 단어장`;
            switchDay(currentDay);
        }

        function startQuiz(type) {
            quizType = type;
            quizState.index = 0;
            quizState.score = 0;
            document.getElementById('quizMenu').classList.add('hidden');

            if (type === 'choice') {
                document.getElementById('quizViewChoice').classList.remove('hidden');
                document.getElementById('header').style.backgroundColor = '#3b82f6';
                quizState.items = [...wordData[currentDay]].sort(() => Math.random() - 0.5);
                renderChoice();
            } else if (type === 'match') {
                document.getElementById('quizViewMatch').classList.remove('hidden');
                document.getElementById('header').style.backgroundColor = '#22c55e';
                renderMatch();
            } else if (type === 'scramble') {
                document.getElementById('quizViewScramble').classList.remove('hidden');
                document.getElementById('header').style.backgroundColor = '#a855f7';
                quizState.items = [...wordData[currentDay]].sort(() => Math.random() - 0.5);
                renderScramble();
            }
        }

        function renderChoice() {
            const item = quizState.items[quizState.index];
            document.getElementById('choiceWord').innerText = item.word.toLowerCase();
            document.getElementById('choiceInfo').innerHTML = `<span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-xs font-bold">${quizState.index + 1} / ${quizState.items.length}</span>`;
            document.getElementById('choiceSpeakBtn').onclick = () => speak(item.word);

            let opts = [item.meaning];
            const others = Object.values(wordData).flat().map(i => i.meaning).filter(m => m !== item.meaning);
            opts.push(...others.sort(() => Math.random() - 0.5).slice(0, 2));
            opts.sort(() => Math.random() - 0.5);

            const container = document.getElementById('choiceOptions');
            container.innerHTML = '';
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'quiz-option w-full bg-white border-2 border-gray-100 py-4 rounded-2xl font-bold text-gray-700 hover:border-blue-400';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt === item.meaning);
                container.appendChild(btn);
            });
        }

        function renderMatch() {
            const currentWords = wordData[currentDay];
            let cards = [];
            currentWords.forEach((w, i) => {
                cards.push({ id: i, text: w.word.toLowerCase(), type: 'en' });
                cards.push({ id: i, text: w.meaning, type: 'ko' });
            });
            cards.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('matchGrid');
            grid.innerHTML = '';
            cards.forEach(card => {
                const div = document.createElement('div');
                div.className = 'match-card bg-white border-2 border-gray-200 p-4 rounded-xl text-center font-bold text-gray-700 shadow-sm flex items-center justify-center min-h-[80px]';
                div.innerText = card.text;
                div.onclick = () => handleMatchClick(card, div);
                grid.appendChild(div);
            });
            quizState.matchedCount = 0;
            quizState.totalPairs = currentWords.length;
        }

        function handleMatchClick(card, element) {
            if (element.classList.contains('match-correct')) return;
            if (quizState.selected && quizState.selected.element === element) return;

            element.classList.add('match-selected');

            if (!quizState.selected) {
                quizState.selected = { card, element };
            } else {
                const first = quizState.selected;
                if (first.card.id === card.id && first.card.type !== card.type) {
                    const colorClass = `matched-color-${card.id % 5}`;
                    setTimeout(() => {
                        element.classList.remove('match-selected');
                        first.element.classList.remove('match-selected');
                        element.classList.add('match-correct', colorClass);
                        first.element.classList.add('match-correct', colorClass);

                        quizState.matchedCount++;
                        if (quizState.matchedCount === quizState.totalPairs) {
                            setTimeout(showResult, 1000);
                        }
                    }, 200);

                    const cheers = ["Yes!", "Good job!", "Perfect!", "Wow!", "Nice!"];
                    const randomCheer = cheers[Math.floor(Math.random() * cheers.length)];
                    speak(randomCheer, true);
                    showFeedback(true);
                } else {
                    setTimeout(() => {
                        element.classList.remove('match-selected');
                        first.element.classList.remove('match-selected');
                    }, 500);
                    showFeedback(false);
                    speak("Try again!", false);
                }
                quizState.selected = null;
            }
        }

        function renderScramble() {
            const item = quizState.items[quizState.index];
            quizState.currentInput = "";
            document.getElementById('scrambleMeaning').innerText = item.meaning;
            document.getElementById('scrambleDisplay').innerText = "";
            document.getElementById('scrambleSpeakBtn').onclick = () => speak(item.word);

            const letters = item.word.toLowerCase().split('').sort(() => Math.random() - 0.5);
            const container = document.getElementById('scrambleLetters');
            container.innerHTML = '';
            letters.forEach((l, i) => {
                const btn = document.createElement('button');
                btn.className = 'letter-card w-12 h-12 bg-white border-2 border-purple-200 rounded-xl font-black text-xl text-purple-600 shadow-sm lowercase';
                btn.innerText = l;
                btn.onclick = () => {
                    // 철자 클릭 시 해당 알파벳 발음 재생
                    speak(l);

                    quizState.currentInput += l;
                    document.getElementById('scrambleDisplay').innerText = quizState.currentInput.toLowerCase();
                    btn.style.visibility = 'hidden';
                    if (quizState.currentInput.length === item.word.length) {
                        checkAnswer(quizState.currentInput.toLowerCase() === item.word.toLowerCase());
                    }
                };
                container.appendChild(btn);
            });
        }

        function resetScramble() {
            renderScramble();
        }

        function checkAnswer(isCorrect) {
            showFeedback(isCorrect);
            if (isCorrect) {
                const greatCheers = ["Amazing!", "You're a genius!", "Unbelievable!", "Great job!", "So smart!"];
                const randomGreat = greatCheers[Math.floor(Math.random() * greatCheers.length)];
                speak(randomGreat, true);

                if (quizType !== 'match') {
                    setTimeout(() => {
                        if (quizState.index < quizState.items.length - 1) {
                            quizState.index++;
                            quizType === 'choice' ? renderChoice() : renderScramble();
                        } else {
                            showResult();
                        }
                    }, 1200);
                }
            } else {
                speak("It's okay! Try one more time!", false);
                if (quizType === 'scramble') {
                    setTimeout(resetScramble, 800);
                }
            }
        }

        function showFeedback(isCorrect) {
            const fb = document.getElementById('feedback');
            const icon = document.getElementById('feedbackIcon');
            icon.innerText = isCorrect ? "⭕" : "❌";
            icon.className = isCorrect ? "text-green-500 correct-anim text-9xl" : "text-red-500 text-9xl";
            fb.classList.remove('opacity-0');
            setTimeout(() => fb.classList.add('opacity-0'), 700);
        }

        function showResult() {
            document.querySelectorAll('[id^="quizView"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('resultView').classList.remove('hidden');
            speak("Wow! You finished everything! You are an English superstar!", true);
        }

        window.onload = () => {
            initVoices();
        };
    </script>
</body>

</html>
