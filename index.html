<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Words</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">

    <!-- 1. Name Entry Screen -->
    <div id="nameEntryScreen"
        class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center border-4 border-blue-100">
        <div class="mb-6">
            <div class="w-32 h-32 mx-auto mb-4 drop-shadow-lg">
                <img src="mascot.png" alt="Cute Mascot"
                    class="w-full h-full object-contain rounded-full border-4 border-white shadow-inner bg-blue-50">
            </div>
            <h1 class="text-2xl font-black text-gray-800 mb-2">반가워요!</h1>
            <p class="text-gray-500 text-sm font-medium">영어 이름을 입력하고 신나게 시작해볼까요?</p>
        </div>
        <input type="text" id="nameInput" placeholder="Enter your English name"
            class="w-full p-4 border-2 border-blue-100 rounded-2xl mb-4 text-center text-xl font-bold focus:outline-none focus:border-blue-400">
        <button onclick="startApp()"
            class="w-full bg-blue-500 hover:bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg transition-transform active:scale-95 text-lg">
            단어장으로 고고!
        </button>
    </div>

    <!-- 2. Main App Container -->
    <div id="mainApp"
        class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-blue-100 hidden">

        <!-- Header -->
        <div id="header"
            class="bg-blue-500 p-6 text-center text-white transition-colors duration-500 relative flex justify-center items-center">
            <!-- Home Button -->
            <button onclick="resetToHome()" class="absolute left-6 text-white hover:text-blue-100 transition-colors"
                title="단어장 메인으로">
                <i class="fas fa-home text-xl"></i>
            </button>

            <h1 id="headerTitle" class="text-2xl font-extrabold mx-8">
                <i class="fas fa-graduation-cap text-yellow-300 mr-2"></i><span id="displayUserName"></span>의 영어 단어장
            </h1>

            <!-- Admin Button -->
            <button onclick="openAdmin()" class="absolute right-6 text-white hover:text-blue-100 transition-colors"
                title="Admin Menu">
                <i class="fas fa-cog text-xl"></i>
            </button>
        </div>

        <!-- Week Tabs -->
        <div id="weekTabsContainer" class="bg-blue-100 px-4 py-2 border-b-2 border-blue-200">
            <div id="weekTabs" class="flex gap-2 overflow-x-auto pb-1 hide-scrollbar">
                <button onclick="switchWeek(1)"
                    class="flex-shrink-0 px-4 py-2 rounded-full font-bold text-sm bg-blue-600 text-white border-2 border-transparent transition-all">Week 1</button>
                <button onclick="switchWeek(2)"
                    class="flex-shrink-0 px-4 py-2 rounded-full font-bold text-sm bg-white text-blue-600 border-2 border-blue-200 transition-all shadow-sm hover:bg-blue-50">Week 2</button>
                <button onclick="switchWeek(3)"
                    class="flex-shrink-0 px-4 py-2 rounded-full font-bold text-sm bg-white text-blue-600 border-2 border-blue-200 transition-all shadow-sm hover:bg-blue-50">Week 3</button>
                <button onclick="switchWeek(4)"
                    class="flex-shrink-0 px-4 py-2 rounded-full font-bold text-sm bg-white text-blue-600 border-2 border-blue-200 transition-all shadow-sm hover:bg-blue-50">Week 4</button>
            </div>
        </div>

        <!-- Day Tabs -->
        <div id="dayTabs" class="flex p-4 gap-2 bg-blue-50">
            <button onclick="switchDay('Mon')" id="tabMon"
                class="flex-1 py-2 rounded-2xl font-bold text-blue-600 bg-white border-2 border-blue-200 transition-all tab-active flex flex-col items-center justify-center">
                <span>Mon</span><span id="dateMon" class="text-xs font-medium opacity-80 mt-0.5">3/2</span>
            </button>
            <button onclick="switchDay('Wed')" id="tabWed"
                class="flex-1 py-2 rounded-2xl font-bold text-blue-600 bg-white border-2 border-blue-200 transition-all flex flex-col items-center justify-center">
                <span>Wed</span><span id="dateWed" class="text-xs font-medium opacity-80 mt-0.5">3/4</span>
            </button>
            <button onclick="switchDay('Fri')" id="tabFri"
                class="flex-1 py-2 rounded-2xl font-bold text-blue-600 bg-white border-2 border-blue-200 transition-all flex flex-col items-center justify-center">
                <span>Fri</span><span id="dateFri" class="text-xs font-medium opacity-80 mt-0.5">3/6</span>
            </button>
        </div>

        <!-- Main Content Area -->
        <div id="mainContent" class="p-6 min-h-[500px] flex flex-col">

            <!-- Study View -->
            <div id="studyView" class="space-y-6">
                <div id="wordList" class="space-y-6"></div>
                <div class="grid grid-cols-1 gap-3 mt-6">
                    <p class="text-center text-sm font-bold text-gray-400">다 외웠나요? 그럼 게임을 시작해요!</p>
                    <button onclick="openQuizMenu()"
                        class="w-full bg-yellow-400 hover:bg-yellow-500 text-white font-black py-4 rounded-2xl shadow-lg flex items-center justify-center gap-2 text-lg transition-transform active:scale-95">
                        <i class="fas fa-rocket"></i> 게임 모드로 변신!
                    </button>
                </div>
            </div>

            <!-- Quiz Selection Menu -->
            <div id="quizMenu" class="hidden space-y-4 py-4">
                <h3 class="text-center font-bold text-gray-700 mb-4">어떤 모험을 떠날까요?</h3>
                <button onclick="startQuiz('choice')"
                    class="w-full p-5 bg-blue-50 border-2 border-blue-200 rounded-2xl flex items-center gap-4 hover:bg-blue-100 transition-all shadow-sm">
                    <div class="bg-blue-500 text-white w-12 h-12 rounded-full flex items-center justify-center text-xl">
                        <i class="fas fa-star"></i>
                    </div>
                    <div class="text-left">
                        <p class="font-bold text-gray-800 text-lg">뜻 고르기</p>
                        <p class="text-xs text-gray-500">알맞은 뜻을 콕! 찍어주세요</p>
                    </div>
                </button>
                <button onclick="startQuiz('match')"
                    class="w-full p-5 bg-green-50 border-2 border-green-200 rounded-2xl flex items-center gap-4 hover:bg-green-100 transition-all shadow-sm">
                    <div
                        class="bg-green-500 text-white w-12 h-12 rounded-full flex items-center justify-center text-xl">
                        <i class="fas fa-puzzle-piece"></i>
                    </div>
                    <div class="text-left">
                        <p class="font-bold text-gray-800 text-lg">카드 짝 맞추기</p>
                        <p class="text-xs text-gray-500">단어와 뜻을 연결해요</p>
                    </div>
                </button>
                <button onclick="startQuiz('scramble')"
                    class="w-full p-5 bg-purple-50 border-2 border-purple-200 rounded-2xl flex items-center gap-4 hover:bg-purple-100 transition-all shadow-sm">
                    <div
                        class="bg-purple-500 text-white w-12 h-12 rounded-full flex items-center justify-center text-xl">
                        <i class="fas fa-keyboard"></i>
                    </div>
                    <div class="text-left">
                        <p class="font-bold text-gray-800 text-lg">스펠링 게임</p>
                        <p class="text-xs text-gray-500">철자를 순서대로 톡톡!</p>
                    </div>
                </button>
                <button onclick="exitQuiz()" class="w-full py-3 text-gray-400 font-bold mt-4">단어장으로 돌아가기</button>
            </div>

            <!-- Choice Quiz View -->
            <div id="quizViewChoice" class="hidden text-center">
                <div id="choiceInfo" class="flex justify-between items-center mb-6"></div>
                <div class="mb-8">
                    <h2 id="choiceWord" class="text-5xl font-black text-gray-800 mb-4 lowercase"></h2>
                    <button id="choiceSpeakBtn" class="bg-blue-100 text-blue-600 p-4 rounded-full shadow-inner"><i
                            class="fas fa-volume-up text-2xl"></i></button>
                </div>
                <div id="choiceOptions" class="grid grid-cols-1 gap-3"></div>
            </div>

            <!-- Match Quiz View -->
            <div id="quizViewMatch" class="hidden">
                <p class="text-center text-gray-500 mb-4 text-sm font-bold">같은 짝을 찾으면 같은 색으로 변해요!</p>
                <div id="matchGrid" class="grid grid-cols-2 gap-3"></div>
            </div>

            <!-- Scramble Quiz View -->
            <div id="quizViewScramble" class="hidden text-center">
                <p id="scrambleMeaning" class="text-2xl font-bold text-blue-600 mb-2"></p>
                <div class="mb-6 flex justify-center items-center gap-4">
                    <div id="scrambleDisplay"
                        class="text-3xl font-black tracking-widest text-gray-300 border-b-4 border-dashed min-h-[50px] min-w-[150px] flex items-center justify-center lowercase">
                    </div>
                    <button id="scrambleSpeakBtn" class="text-blue-400 hover:text-blue-600"><i
                            class="fas fa-volume-up text-xl"></i></button>
                </div>
                <div id="scrambleLetters" class="letter-grid"></div>
                <button onclick="resetScramble()" class="mt-8 text-xs text-gray-400 border px-3 py-1 rounded-lg">처음부터
                    다시</button>
            </div>

            <!-- Result View -->
            <div id="resultView" class="hidden text-center py-10">
                <div class="text-7xl mb-6 correct-anim">⭐</div>
                <h2 class="text-3xl font-black text-gray-800 mb-2">대단해요! 최고예요!</h2>
                <p class="text-gray-600 mb-6 font-medium">오늘 공부도 완벽하게 성공!</p>
                <button onclick="exitQuiz()"
                    class="w-full bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg text-lg">기분 좋게
                    돌아가기</button>
            </div>

        </div>
    </div>

    <!-- 3. Admin Login Screen -->
    <div id="adminLoginScreen"
        class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center border-4 border-gray-200 hidden">
        <h2 class="text-2xl font-black text-gray-800 mb-6"><i class="fas fa-lock text-gray-400 mr-2"></i>관리자 로그인</h2>
        <input type="password" id="adminPassword" placeholder="비밀번호를 입력하세요"
            class="w-full p-4 border-2 border-gray-200 rounded-2xl mb-4 text-center text-xl font-bold focus:outline-none focus:border-gray-400">
        <button onclick="loginAdmin()"
            class="w-full bg-gray-800 hover:bg-gray-900 text-white font-black py-4 rounded-2xl shadow-lg transition-transform active:scale-95 text-lg mb-2">로그인</button>
        <button onclick="closeAdmin()"
            class="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 rounded-2xl transition-transform active:scale-95">취소</button>
        <p id="adminLoginError" class="text-red-500 text-sm mt-4 hidden font-bold">비밀번호가 틀렸습니다.</p>
    </div>

    <!-- 4. Admin Dashboard -->
    <div id="adminDashboard"
        class="max-w-md w-full bg-white rounded-3xl shadow-xl border-4 border-gray-800 hidden flex flex-col h-[90vh]">
        <div class="bg-gray-800 p-4 text-white flex justify-between items-center shrink-0 rounded-t-2xl">
            <h2 class="text-xl font-bold"><i class="fas fa-cogs mr-2"></i>단어 관리</h2>
            <button onclick="closeAdmin()" class="text-gray-300 hover:text-white"><i
                    class="fas fa-times text-2xl"></i></button>
        </div>

        <!-- Admin Week Tabs -->
        <div class="bg-gray-200 px-4 py-2 border-b border-gray-300 shrink-0">
            <div id="adminWeekTabs" class="flex gap-2 overflow-x-auto pb-1 hide-scrollbar">
                <button onclick="switchAdminWeek(1)"
                    class="flex-shrink-0 px-3 py-1.5 rounded-full font-bold text-xs bg-blue-600 text-white border-2 border-blue-600 transition-all">Week 1</button>
                <button onclick="switchAdminWeek(2)"
                    class="flex-shrink-0 px-3 py-1.5 rounded-full font-bold text-xs bg-white text-gray-600 border-2 border-gray-300 transition-all hover:bg-gray-50">Week 2</button>
                <button onclick="switchAdminWeek(3)"
                    class="flex-shrink-0 px-3 py-1.5 rounded-full font-bold text-xs bg-white text-gray-600 border-2 border-gray-300 transition-all hover:bg-gray-50">Week 3</button>
                <button onclick="switchAdminWeek(4)"
                    class="flex-shrink-0 px-3 py-1.5 rounded-full font-bold text-xs bg-white text-gray-600 border-2 border-gray-300 transition-all hover:bg-gray-50">Week 4</button>
            </div>
        </div>

        <!-- Admin Day Tabs -->
        <div id="adminDayTabs" class="p-4 flex gap-2 bg-gray-100 shrink-0 border-b border-gray-300">
            <button onclick="switchAdminDay('Mon')" id="adminTabMon"
                class="flex-1 py-2.5 rounded-xl font-bold bg-gray-800 text-white border border-gray-800 tab-active transition-colors flex flex-col items-center justify-center leading-tight">
                <span>Mon</span><span id="adminDateMon" class="text-[10px] font-normal opacity-80 mt-0.5">3/2</span>
            </button>
            <button onclick="switchAdminDay('Wed')" id="adminTabWed"
                class="flex-1 py-2.5 rounded-xl font-bold bg-white text-gray-600 border border-gray-300 transition-colors flex flex-col items-center justify-center leading-tight">
                <span>Wed</span><span id="adminDateWed" class="text-[10px] font-normal opacity-80 mt-0.5">3/4</span>
            </button>
            <button onclick="switchAdminDay('Fri')" id="adminTabFri"
                class="flex-1 py-2.5 rounded-xl font-bold bg-white text-gray-600 border border-gray-300 transition-colors flex flex-col items-center justify-center leading-tight">
                <span>Fri</span><span id="adminDateFri" class="text-[10px] font-normal opacity-80 mt-0.5">3/6</span>
            </button>
        </div>

        <div class="p-4 bg-gray-50 border-b shrink-0">
            <h3 class="font-bold text-gray-700 mb-2">새 단어 추가</h3>
            <div class="space-y-2">
                <input type="text" id="newWord" placeholder="단어 (예: apple)" class="w-full p-2 border rounded-lg">
                <input type="text" id="newMeaning" placeholder="뜻 (예: 사과)" class="w-full p-2 border rounded-lg">
                <input type="text" id="newExample" placeholder="영어 예문" class="w-full p-2 border rounded-lg">
                <input type="text" id="newKorEx" placeholder="한글 뜻 예문" class="w-full p-2 border rounded-lg">
                <button onclick="addWord()"
                    class="w-full bg-blue-500 text-white font-bold py-2 rounded-lg mt-2">추가하기</button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 bg-white" id="adminWordList">
            <!-- Admin word list will be rendered here -->
        </div>
    </div>

    <!-- Feedback Overlay -->
    <div id="feedback"
        class="fixed inset-0 pointer-events-none flex items-center justify-center z-[100] opacity-0 transition-opacity duration-300">
        <div id="feedbackIcon" class="text-9xl"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
